name: Android APK Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag, for example v2.0.1
        required: true
        type: string
      release_name:
        description: Optional release title
        required: false
        type: string
      prerelease:
        description: Mark the GitHub Release as a pre-release
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag_name }}
      RELEASE_NAME: ${{ inputs.release_name != '' && inputs.release_name || inputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "11.7.0"

      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: "pnpm"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Check Expo dependency compatibility
        run: pnpm --filter @daily-health/mobile exec expo install --check

      - name: Assert safe mobile startup source
        run: |
          if grep -R -nE 'SecureStore\.getItem\(' apps/mobile; then
            echo "::error::Mobile startup must not use the unavailable synchronous SecureStore API."
            exit 1
          fi
          if grep -nE 'globalThis\.crypto|randomUUID' apps/mobile/src/auth/statusShared.ts apps/mobile/src/data/LocalAdapter.ts; then
            echo "::error::Mobile IDs must not depend on a platform crypto polyfill."
            exit 1
          fi
          grep -F 'createLocalSelection(localStatus())' apps/mobile/src/state/AppProvider.tsx
          if grep -F 'useState<AdapterSelection>(() => resolveAdapter' apps/mobile/src/state/AppProvider.tsx; then
            echo "::error::AppProvider must not initialize a platform adapter during its first render."
            exit 1
          fi

      - name: Inject tag version
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from "node:fs/promises";
          const tag = process.env.RELEASE_TAG ?? "";
          const version = tag.replace(/^v/, "");
          if (!version) throw new Error("Release tag must contain a version.");
          const path = "apps/mobile/app.json";
          const app = JSON.parse(await readFile(path, "utf8"));
          app.expo.version = version;
          app.expo.android.versionCode = Number(process.env.GITHUB_RUN_NUMBER);
          await writeFile(path, `${JSON.stringify(app, null, 2)}\n`);
          NODE

      - name: Type-check and bundle web/native JavaScript
        run: |
          pnpm --filter @daily-health/mobile typecheck
          pnpm --filter @daily-health/mobile export:web
          pnpm --filter @daily-health/mobile exec expo export --platform android

      - name: Prebuild and build APKs
        run: |
          pnpm --filter @daily-health/mobile prebuild:android
          cd apps/mobile/android
          ./gradlew assembleRelease

      - name: Verify and collect APKs
        id: verify
        run: |
          AAPT="$(find "$ANDROID_HOME/build-tools" -maxdepth 2 -name aapt | sort -V | tail -n1)"
          expected_name="${RELEASE_TAG#v}"
          expected_code="$GITHUB_RUN_NUMBER"
          
          mkdir -p publish
          
          # Find all release APKs (including split ones)
          find apps/mobile/android/app/build/outputs/apk/release -name "*.apk" | while read -r apk; do
            filename=$(basename "$apk")
            
            # Skip unaligned APKs if any
            if [[ "$filename" == *"-unaligned"* ]]; then continue; fi
            
            echo "Verifying $filename..."
            
            # Security check
            if unzip -l "$apk" | grep -E -i 'capacitor|nodejs|libnode\.so|query_engine|prisma'; then
              echo "::error::$filename contains a removed embedded-server artifact."
              exit 1
            fi
            
            # Version check
            badging="$($AAPT dump badging "$apk")"
            if ! echo "$badging" | grep -F "versionName='$expected_name'" > /dev/null; then
              echo "::error::$filename has wrong versionName"
              exit 1
            fi
            
            # Copy for publishing
            cp "$apk" "publish/daily-health-$filename"
          done
          
          echo "files=$(ls -m publish/daily-health-*.apk | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ inputs.prerelease }}
          files: publish/*.apk
