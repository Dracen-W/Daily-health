<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#34785f" />
    <title>Daily Health Mobile</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #e4f4ec, #eaf4ff 52%, #fff4d0);
        color: #17211c;
      }

      main {
        width: min(92vw, 440px);
        border: 1px solid rgba(255, 255, 255, 0.75);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 18px 45px rgba(20, 35, 30, 0.12);
        padding: 24px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      p {
        color: #52645b;
        line-height: 1.6;
      }

      label {
        display: grid;
        gap: 8px;
        margin-top: 18px;
        font-weight: 700;
      }

      input,
      button {
        min-height: 44px;
        border-radius: 6px;
        font: inherit;
      }

      input {
        border: 1px solid #b9c8c0;
        padding: 0 12px;
      }

      button {
        width: 100%;
        margin-top: 14px;
        border: 0;
        background: #34785f;
        color: white;
        font-weight: 800;
      }

      .hint {
        font-size: 13px;
      }

      .error {
        min-height: 20px;
        color: #b65973;
        font-weight: 700;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: linear-gradient(135deg, #12211c, #141d2c 52%, #2b1f2b);
          color: #f8fafc;
        }

        main {
          border-color: rgba(51, 65, 85, 0.85);
          background: rgba(15, 23, 42, 0.9);
        }

        p {
          color: #cbd5e1;
        }

        input {
          border-color: #334155;
          background: #020617;
          color: #f8fafc;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Daily Health</h1>
      <p>
        Connect this mobile client to a running Daily Health server.
        <br />
        将手机端连接到正在运行的 Daily Health 服务地址。
      </p>
      <form id="server-form">
        <label>
          Server URL / 服务地址
          <input id="server-url" type="url" placeholder="https://your-domain.com" autocomplete="url" required />
        </label>
        <button type="submit">Open Daily Health / 打开应用</button>
        <p class="hint">
          For local testing, use the computer LAN address, for example http://192.168.1.20:3000.
          本地测试请使用电脑局域网地址，例如 http://192.168.1.20:3000。
        </p>
        <p id="error" class="error" aria-live="polite"></p>
      </form>
    </main>
    <script>
      const key = "daily_health_mobile_server_url";
      const input = document.getElementById("server-url");
      const error = document.getElementById("error");
      const saved = localStorage.getItem(key);

      if (saved) {
        input.value = saved;
      }

      document.getElementById("server-form").addEventListener("submit", (event) => {
        event.preventDefault();
        error.textContent = "";
        try {
          const url = new URL(input.value.trim());
          if (url.protocol !== "http:" && url.protocol !== "https:") {
            throw new Error("Unsupported protocol.");
          }
          localStorage.setItem(key, url.toString());
          window.location.href = url.toString();
        } catch {
          error.textContent = "Please enter a valid http or https URL. / 请输入有效的网址。";
        }
      });
    </script>
  </body>
</html>
